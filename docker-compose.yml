services:
  hr-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: simpleflow-hr-backend:dev
    container_name: simpleflow-hr-runtime
    working_dir: /workspace/backend
    env_file:
      - ./.env
    environment:
      WORKFLOW_ROOT: /workspace/workflows
      PYTHONUNBUFFERED: "1"
    command: uvicorn app:app --host 0.0.0.0 --port 8091
    volumes:
      - ./backend:/workspace/backend
      - ./workflows:/workspace/workflows
    ports:
      - "8092:8091"
    networks:
      - default
      - simpleflow_control_plane
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hr-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: simpleflow-hr-frontend:dev
    container_name: simpleflow-hr-frontend
    working_dir: /workspace/frontend
    env_file:
      - ./.env
    command: sh -lc "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/workspace/frontend
      - hr-frontend-node-modules:/workspace/frontend/node_modules
    ports:
      - "5175:5173"
    depends_on:
      - hr-backend

networks:
  simpleflow_control_plane:
    external: true
    name: simpleflow_default

volumes:
  hr-frontend-node-modules:
