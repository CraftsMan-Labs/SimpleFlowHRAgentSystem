services:
  hr-backend:
    image: python:3.12-slim
    container_name: simpleflow-hr-runtime
    working_dir: /workspace/backend
    env_file:
      - ./backend/.env
    environment:
      WORKFLOW_ROOT: /workspace/workflows
      PYTHONUNBUFFERED: "1"
    command: >-
      sh -lc "
      apt-get update &&
      apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev &&
      pip install --no-cache-dir fastapi uvicorn PyJWT &&
      pip install --no-cache-dir -e /deps/SimpleFlowSDKs/python &&
      pip install --no-cache-dir -e /deps/SimpleAgents/crates/simple-agents-py &&
      uvicorn app:app --host 0.0.0.0 --port 8091
      "
    volumes:
      - ./backend:/workspace/backend
      - ./workflows:/workspace/workflows
      - ../../SimpleFlowSDKs:/deps/SimpleFlowSDKs
      - ../../SimpleAgents:/deps/SimpleAgents
    ports:
      - "8092:8091"
    networks:
      - default
      - simpleflow_control_plane

  hr-frontend:
    image: node:20-alpine
    container_name: simpleflow-hr-frontend
    working_dir: /workspace/frontend
    env_file:
      - ./frontend/.env
    command: >-
      sh -lc "
      npm install &&
      npm run build &&
      npm run preview -- --host 0.0.0.0 --port 5173
      "
    volumes:
      - ./frontend:/workspace/frontend
    ports:
      - "5175:5173"
    depends_on:
      - hr-backend

networks:
  simpleflow_control_plane:
    external: true
    name: simpleflow_default
